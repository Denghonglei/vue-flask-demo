<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <title>常见问题 - 长发估价</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#FF7D00',
                        neutral: {
                            100: '#F5F7FA',
                            200: '#E4E7ED',
                            300: '#C0C4CC',
                            400: '#909399',
                            500: '#606266',
                            600: '#303133',
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <style>
        /* 三角符号样式 */
        .question i {
            transition: transform 0.3s ease;
        }
        .question.open i {
            transform: rotate(90deg);
        }
    </style>
</head>
<body class="bg-neutral-100 font-sans min-h-screen">
<!-- 导航栏 -->
<header class="sticky top-0 z-50 bg-white shadow-sm transition-all duration-300" id="navbar">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i class="fa-solid fa-recycle text-primary text-2xl"></i>
            <h1 class="text-xl font-bold text-neutral-600">常见问题</h1>
        </div>
        <nav class="hidden md:flex space-x-6">
            <a href="/static/testHead.html" class="text-neutral-500 hover:text-primary transition-colors">首页</a>
            <a href="/static/index.html" class="text-neutral-500 hover:text-primary transition-colors">估价</a>
            <a href="/static/preBooking.html" class="text-neutral-500 hover:text-primary transition-colors">预约上门</a>
            <a href="/static/questions.html" class="text-primary font-medium">常见问题</a>
            <a href="/static/contact.html" class="text-neutral-500 hover:text-primary transition-colors">联系我们</a>
        </nav>
        <button class="md:hidden text-neutral-600 focus:outline-none" id="menuBtn">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>
    </div>
    <!-- 移动端菜单 -->
    <div class="md:hidden bg-white shadow-md absolute w-full left-0 top-full transform -translate-y-full opacity-0 transition-all duration-300 invisible"
         id="mobileMenu">
        <div class="container mx-auto px-4 py-2 flex flex-col space-y-3">
            <a href="/static/testHead.html" class="py-2 px-4 hover:bg-neutral-100 rounded-lg transition-colors">首页</a>
            <a href="/static/index.html" class="py-2 px-4 hover:bg-neutral-100 rounded-lg font-medium">估价</a>
            <a href="/static/preBooking.html" class="py-2 px-4 hover:bg-neutral-100 rounded-lg transition-colors">预约上门</a>
            <a href="/static/questions.html" class="py-2 px-4 bg-primary/10 text-primary rounded-lg transition-colors">常见问题</a>
            <a href="/static/contact.html" class="py-2 px-4 hover:bg-neutral-100 rounded-lg transition-colors">联系我们</a>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-8 md:py-12">
    <div class="max-w-3xl mx-auto">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-neutral-700 mb-3">常见问题解答</h2>
            <p class="text-neutral-500">这里整理了大家最常问的问题，希望能帮到您</p>
        </div>

        <!-- 搜索框 -->
        <div class="mb-8">
            <div class="relative">
                <input type="text" id="search-input" placeholder="搜索您想了解的问题..."
                       class="w-full px-4 py-3 pl-12 border border-neutral-200 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-neutral-400"></i>
                <button id="search-button"
                        class="absolute right-2 top-1/2 -translate-y-1/2 px-4 py-1.5 bg-primary hover:bg-primary/90 text-white rounded-md transition-all">
                    搜索
                </button>
            </div>
        </div>

        <!-- 问答列表 -->
        <div id="qa-list" class="space-y-4 mb-8">
            <!-- 问题和答案将在这里动态添加 -->
        </div>

        <!-- 加载更多按钮 -->
        <button id="load-more"
                class="w-full py-3 bg-white hover:bg-neutral-50 border border-neutral-200 rounded-lg text-neutral-600 font-medium transition-all disabled:bg-neutral-100 disabled:text-neutral-400 disabled:cursor-not-allowed">
            加载更多
        </button>
    </div>
</main>

<script>
    // 移动端菜单切换
    const menuBtn = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    menuBtn.addEventListener('click', () => {
        if (mobileMenu.classList.contains('invisible')) {
            mobileMenu.classList.remove('invisible', 'opacity-0', '-translate-y-full');
            mobileMenu.classList.add('opacity-100', 'translate-y-0');
            menuBtn.innerHTML = '<i class="fa-solid fa-times text-xl"></i>';
        } else {
            mobileMenu.classList.add('opacity-0', '-translate-y-full');
            mobileMenu.classList.remove('opacity-100', 'translate-y-0');
            setTimeout(() => {
                mobileMenu.classList.add('invisible');
            }, 300);
            menuBtn.innerHTML = '<i class="fa-solid fa-bars text-xl"></i>';
        }
    });

    const qaList = document.getElementById('qa-list');
    const loadMoreButton = document.getElementById('load-more');
    const searchInput = document.getElementById('search-input');
    const searchButton = document.getElementById('search-button');
    let currentPage = 1;
    const pageSize = 10;

    async function fetchData(page, searchWord = '') {
        try {
            const response = await fetch(`/api/list-questions?page=${page}&pageSize=${pageSize}&search=${encodeURIComponent(searchWord)}`);
            if (!response.ok) {
                throw new Error('网络请求失败');
            }
            const data = await response.json();
            if (data.code === 0) {
                return data.data;
            } else {
                console.error('接口返回错误：', data.message);
                return [];
            }
        } catch (error) {
            console.error('数据获取失败:', error);
            // 开发环境模拟数据
            return [
                {key: "长发回收的流程是什么？", value: "首先您可以使用我们的估价计算器预估价格，然后选择上门回收或者快递回收，我们收到头发验收后会立即打款。"},
                {key: "头发多长可以卖？", value: "我们回收长度30cm以上的健康长发，越长价格越高。"},
                {key: "烫染过的头发可以回收吗？", value: "烫染过的头发也可以回收，只是价格会比原生发稍低一些。"},
                {key: "剪发方式有什么区别？", value: "一刀剪是齐根剪下，能获得最重的重量；抽剪是剪取长发保留短发，不影响发型。"},
                {key: "款项多久能到账？", value: "我们收到头发验收合格后，会在24小时内打款到您指定的账户。"}
            ];
        }
    }

    function renderQAs(data) {
        data.forEach(item => {
            const qaItem = document.createElement('div');
            qaItem.classList.add('bg-white', 'rounded-xl', 'shadow-sm', 'overflow-hidden', 'transition-all', 'hover:shadow-md');

            const question = document.createElement('div');
            question.classList.add('question', 'cursor-pointer', 'p-4', 'flex', 'justify-between', 'items-center', 'font-medium', 'text-neutral-700');
            question.innerHTML = `<span>${item.key}</span>`;

            // 添加三角符号
            const arrowIcon = document.createElement('i');
            arrowIcon.classList.add('fa-solid', 'fa-chevron-right', 'text-primary');
            question.appendChild(arrowIcon);

            question.addEventListener('click', () => {
                const answer = qaItem.querySelector('.answer');
                const isOpen = question.classList.contains('open');

                // 关闭其他所有
                const allAnswers = qaList.querySelectorAll('.answer');
                const allQuestions = qaList.querySelectorAll('.question');
                allAnswers.forEach(a => a.style.display = 'none');
                allQuestions.forEach(q => q.classList.remove('open'));

                if (!isOpen) {
                    answer.style.display = 'block';
                    question.classList.add('open');
                }
            });

            const answer = document.createElement('div');
            answer.classList.add('answer', 'p-4', 'bg-neutral-50', 'text-neutral-600', 'border-t', 'border-neutral-100', 'leading-relaxed');
            answer.textContent = item.value;
            answer.style.display = 'none';

            qaItem.appendChild(question);
            qaItem.appendChild(answer);
            qaList.appendChild(qaItem);
        });
    }

    async function loadData(page, searchWord = '') {
        loadMoreButton.disabled = true;
        loadMoreButton.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>加载中...';

        const data = await fetchData(page, searchWord);
        if (data.length > 0) {
            renderQAs(data);
            if (data.length < pageSize) {
                loadMoreButton.disabled = true;
                loadMoreButton.textContent = '没有更多数据了';
            } else {
                loadMoreButton.disabled = false;
                loadMoreButton.textContent = '加载更多';
            }
        } else {
            loadMoreButton.disabled = true;
            loadMoreButton.textContent = '没有更多数据了';
        }
    }

    async function searchQAs(keyword) {
        qaList.innerHTML = '';
        currentPage = 1;
        loadMoreButton.disabled = true;
        loadMoreButton.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>搜索中...';

        const data = await fetchData(currentPage, keyword);
        renderQAs(data);
        if (data.length === 0) {
            loadMoreButton.disabled = true;
            loadMoreButton.textContent = '没有相关数据';
        } else if (data.length < pageSize) {
            loadMoreButton.disabled = true;
            loadMoreButton.textContent = '没有更多数据了';
        } else {
            loadMoreButton.disabled = false;
            loadMoreButton.textContent = '加载更多';
        }
    }

    loadMoreButton.addEventListener('click', async () => {
        currentPage++;
        const keyword = searchInput.value.trim();
        await loadData(currentPage, keyword);
    });

    searchButton.addEventListener('click', async () => {
        const keyword = searchInput.value.trim();
        await searchQAs(keyword);
    });

    // 支持回车搜索
    searchInput.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter') {
            const keyword = searchInput.value.trim();
            await searchQAs(keyword);
        }
    });

    // 初始加载
    loadData(currentPage);
</script>
</body>
</html>
