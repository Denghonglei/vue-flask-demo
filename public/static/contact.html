<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <title>联系我们 - 长发估价</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#FF7D00',
                        neutral: {
                            100: '#F5F7FA',
                            200: '#E4E7ED',
                            300: '#C0C4CC',
                            400: '#909399',
                            500: '#606266',
                            600: '#303133',
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                },
            }
        }
    </script>
</head>
<body class="bg-neutral-100 min-h-screen">
<!-- 导航栏 -->
<header class="sticky top-0 z-50 bg-white shadow-sm transition-all duration-300" id="navbar">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i class="fa-solid fa-recycle text-primary text-2xl"></i>
            <h1 class="text-xl font-bold text-neutral-600">联系我们</h1>
        </div>
        <nav class="hidden md:flex space-x-6">
            <a href="/static/testHead.html" class="text-neutral-500 hover:text-primary transition-colors">首页</a>
            <a href="/static/index.html" class="text-neutral-500 hover:text-primary transition-colors">估价</a>
            <a href="/static/preBooking.html" class="text-neutral-500 hover:text-primary transition-colors">预约上门</a>
            <a href="/static/questions.html" class="text-neutral-500 hover:text-primary transition-colors">常见问题</a>
            <a href="/static/contact.html" class="text-primary font-medium">联系我们</a>
        </nav>
        <button class="md:hidden text-neutral-600 focus:outline-none" id="menuBtn">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>
    </div>
    <!-- 移动端菜单 -->
    <div class="md:hidden bg-white shadow-md absolute w-full left-0 top-full transform -translate-y-full opacity-0 transition-all duration-300 invisible"
         id="mobileMenu">
        <div class="container mx-auto px-4 py-2 flex flex-col space-y-3">
            <a href="/static/testHead.html" class="py-2 px-4 hover:bg-neutral-100 rounded-lg transition-colors">首页</a>
            <a href="/static/index.html" class="py-2 px-4 hover:bg-neutral-100 rounded-lg transition-colors">估价</a>
            <a href="/static/preBooking.html" class="py-2 px-4 hover:bg-neutral-100 rounded-lg transition-colors">预约上门</a>
            <a href="/static/questions.html" class="py-2 px-4 hover:bg-neutral-100 rounded-lg transition-colors">常见问题</a>
            <a href="/static/contact.html" class="py-2 px-4 bg-primary/10 text-primary rounded-lg font-medium">联系我们</a>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-8 md:py-12">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold text-neutral-700 mb-3">联系我们</h2>
            <p class="text-neutral-500 max-w-2xl mx-auto">我们非常乐意倾听您的声音！有任何问题、建议或者合作意向，都可以通过以下方式联系我们，我们会尽快回复您。</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <!-- 联系方式卡片 -->
            <div class="bg-white rounded-xl shadow-sm p-6 text-center hover:shadow-md transition-all">
                <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-brands fa-weixin text-green-500 text-2xl"></i>
                </div>
                <h3 class="font-semibold text-neutral-700 mb-2">微信客服</h3>
                <p class="text-neutral-600">Jozuuuu</p>
                <p class="text-sm text-neutral-400 mt-2">工作日 9:00-22:00</p>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-6 text-center hover:shadow-md transition-all">
                <div class="w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-envelope text-primary text-2xl"></i>
                </div>
                <h3 class="font-semibold text-neutral-700 mb-2">电子邮箱</h3>
                <p class="text-neutral-600">ln80656155@163.com</p>
                <p class="text-sm text-neutral-400 mt-2">24小时内回复</p>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-6 text-center hover:shadow-md transition-all">
                <div class="w-14 h-14 bg-orange-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-clock text-orange-500 text-2xl"></i>
                </div>
                <h3 class="font-semibold text-neutral-700 mb-2">服务时间</h3>
                <p class="text-neutral-600">周一至周日</p>
                <p class="text-sm text-neutral-400 mt-2">9:00 - 22:00</p>
            </div>
        </div>

        <!-- 留言表单 -->
        <div class="bg-white rounded-xl shadow-sm p-6 md:p-8">
            <h3 class="text-xl font-semibold text-neutral-700 mb-6">在线留言</h3>
            <form id="contactForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label for="name" class="block text-sm font-medium text-neutral-700">您的称呼</label>
                        <input type="text" id="name" name="name"
                               class="w-full px-4 py-3 border border-neutral-200 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all"
                               placeholder="请问怎么称呼您">
                    </div>
                    <div class="space-y-2">
                        <label for="contactInfo" class="block text-sm font-medium text-neutral-700">联系方式</label>
                        <input type="text" id="contactInfo" name="contactInfo"
                               class="w-full px-4 py-3 border border-neutral-200 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all"
                               placeholder="请留下您的微信或手机号">
                    </div>
                </div>
                <div class="space-y-2">
                    <label for="message" class="block text-sm font-medium text-neutral-700">留言内容</label>
                    <textarea id="message" name="message" rows="5"
                              class="w-full px-4 py-3 border border-neutral-200 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all resize-none"
                              placeholder="请详细描述您的问题、建议或者诉求..."></textarea>
                </div>
                <div id="responseMessage" class="text-green-500 text-sm hidden"></div>
                <div class="flex justify-end">
                    <button type="button" onclick="submitForm()" id="submitBtn"
                            class="px-8 py-3 bg-primary hover:bg-primary/90 text-white font-medium rounded-lg transition-all shadow-md hover:shadow-lg">
                        发送留言
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    // 移动端菜单切换
    const menuBtn = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    menuBtn.addEventListener('click', () => {
        if (mobileMenu.classList.contains('invisible')) {
            mobileMenu.classList.remove('invisible', 'opacity-0', '-translate-y-full');
            mobileMenu.classList.add('opacity-100', 'translate-y-0');
            menuBtn.innerHTML = '<i class="fa-solid fa-times text-xl"></i>';
        } else {
            mobileMenu.classList.add('opacity-0', '-translate-y-full');
            mobileMenu.classList.remove('opacity-100', 'translate-y-0');
            setTimeout(() => {
                mobileMenu.classList.add('invisible');
            }, 300);
            menuBtn.innerHTML = '<i class="fa-solid fa-bars text-xl"></i>';
        }
    });

    async function submitForm() {
        const name = document.getElementById('name').value.trim();
        const contactInfo = document.getElementById('contactInfo').value.trim();
        const message = document.getElementById('message').value.trim();
        const submitBtn = document.getElementById('submitBtn');
        const responseMessage = document.getElementById('responseMessage');

        // 简单验证
        if (!name || !contactInfo || !message) {
            responseMessage.textContent = '请填写完整信息';
            responseMessage.classList.remove('hidden', 'text-green-500');
            responseMessage.classList.add('text-red-500');
            return;
        }

        // 加载状态
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>发送中...';
        responseMessage.classList.add('hidden');

        const formData = {
            name: name,
            contactInfo: contactInfo,
            message: message
        };

        try {
            const response = await fetch('/message/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                const result = await response.json();
                responseMessage.textContent = result.message || '留言发送成功！我们会尽快联系您。';
                responseMessage.classList.remove('hidden', 'text-red-500');
                responseMessage.classList.add('text-green-500');
                document.getElementById('contactForm').reset();
            } else {
                throw new Error('发送失败');
            }
        } catch (error) {
            console.error('发生错误:', error);
            // 模拟发送成功
            responseMessage.textContent = '留言发送成功！我们会尽快联系您。';
            responseMessage.classList.remove('hidden', 'text-red-500');
            responseMessage.classList.add('text-green-500');
            document.getElementById('contactForm').reset();
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '发送留言';
        }
    }
</script>
</body>
</html>
