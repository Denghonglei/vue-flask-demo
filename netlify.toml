[build]
  command = "npm install && npm run build && pip install -r netlify/functions/requirements.txt"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/lambda_function/:splat"
  status = 200
  [redirects.headers]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET,POST,PUT,DELETE,OPTIONS"
    Access-Control-Allow-Headers = "Content-Type,Authorization"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  condition = {not = {path = ["/api/*", "/.netlify/*"]}}